<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Nikhil's Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: rgb(0, 0, 33);
            color: white;
            font-family: 'Poppins', sans-serif;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
            background-color: rgb(17, 17, 119);
            padding: 0 20px;
        }

        nav ul {
            display: flex;
            gap: 20px;
        }

        nav ul li {
            list-style: none;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            transition: color 0.3s ease;
        }

        nav ul li a:hover {
            color: rgb(116, 116, 233);
        }

        main hr {
            border: 0;
            background-color: rgb(163, 163, 247);
            height: 1.2px;
            margin: 30px 84px;
        }

        .first-section {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            padding: 20px;
        }

        .left-section {
            font-size: 2rem;
            max-width: 500px;
            text-align: center;
        }

        .right-section img {
            width: 100%;
            max-width: 400px;
            margin: 40px 0;
        }

        .purple {
            color: rgb(235, 114, 116);
        }

        .text-grey {
            color: rgb(159, 142, 142);
        }

        #element {
            color: blanchedalmond;
        }

        .second-section {
            max-width: 80vw;
            margin: auto;
            text-align: center;
            padding: 20px;
        }

        .second-section h1 {
            font-size: 1.9rem;
            margin: 20px 0;
        }

        .box {
            background-color: white;
            width: 80vw;
            height: 2px;
            margin: 56px 0;
            display: flex;
            justify-content: center;
        }

        .vertical {
            height: 93px;
            width: 1px;
            background-color: white;
            margin: 0 10px;
        }

        @media (max-width: 768px) {
            .left-section {
                font-size: 1.5rem;
            }

            .right-section img {
                margin: 20px 0;
            }

            nav ul {
                gap: 10px;
            }

            nav ul li {
                margin: 10px;
            }
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="left">Nikhil's Portfolio</div>
            <div class="right">
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/">About</a></li>
                    <li><a href="/">Services</a></li>
                    <li><a href="/">Projects</a></li>
                    <li><a href="/">Contact Me</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="first-section">
            <div class="left-section">
                Hi...! I am <span class="purple"><br> Nikhil Kumre</span><br>
                And I'm a Python Developer with additional knowledge of Java, JavaScript, PHP, HTML, Dart, and
                MySQL.<br>
                <span id="element"></span>
            </div>
            <div class="right-section">
                <img src="bg1.png" alt="Nikhil's Portrait">
            </div>
        </section>
        <hr>
        <section class="second-section">
            <span class="text-grey">What I have done until today.</span>
            <h1>Work Experience</h1>
            <div class="box">
                <div class="vertical"></div>
            </div>
        </section>
    </main>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <script>
        var typed = new Typed('#element', {
            strings: ['Web Developer...', 'Software Developer...', 'Python Programmer...'],
            typeSpeed: 50,
        });
    </script>
</body>

</html>
